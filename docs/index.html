<!DOCTYPE html>
<!-- 
  Language is set dynamically by JS, but we define 'en' as fallback.
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morph-it Processor</title>
    <!-- Tailwind CSS for modern, responsive, and dark-mode compatible styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Tailwind configuration for custom colors and dark mode based on system preference
        tailwind.config = {
            darkMode: 'media', // Respects system/browser dark mode settings
            theme: {
                extend: {
                    colors: {
                        primary: '#4ade80', // Modern green
                        primaryHover: '#22c55e',
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom scrollbar for better aesthetics */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        @media (prefers-color-scheme: dark) {
            ::-webkit-scrollbar-thumb { background: #475569; }
        }

        /* Checkbox styling */
        .cat-checkbox {
            accent-color: #4ade80;
            width: 1.2rem;
            height: 1.2rem;
            cursor: pointer;
        }

        /* Smooth transitions for sections */
        .section-transition {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 1;
            transform: translateY(0);
        }
        .section-hidden {
            opacity: 0;
            transform: translateY(20px);
            pointer-events: none;
            position: absolute;
            visibility: hidden;
        }

        /* Loader animation */
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid #4ade80;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 dark:bg-gray-900 dark:text-gray-100 min-h-screen font-sans transition-colors duration-300">

    <!-- Global Loading Overlay -->
    <div id="loadingOverlay" class="fixed inset-0 bg-gray-900 bg-opacity-70 z-50 flex flex-col items-center justify-center hidden backdrop-blur-sm transition-opacity duration-300">
        <div class="spinner mb-4"></div>
        <p id="loadingText" class="text-white text-lg font-semibold animate-pulse">Processing...</p>
    </div>

    <div class="max-w-4xl mx-auto px-4 py-8 md:py-12">
        
        <!-- Header -->
        <header class="text-center mb-10">
            <h1 class="text-4xl font-extrabold tracking-tight mb-2 text-gray-900 dark:text-white">
                <span class="text-primary" id="t-title-highlight">Morph-it</span> <span id="t-title">Processor</span>
            </h1>
            <p class="text-gray-500 dark:text-gray-400" id="t-subtitle">Upload your lexicon file, filter by category, and export your custom dictionary.</p>
        </header>

        <!-- Main Content Area -->
        <main class="space-y-6 relative">

            <!-- STEP 1: Upload Section -->
            <section id="step1" class="section-transition bg-white dark:bg-gray-800 rounded-2xl shadow-lg p-6 md:p-8 border border-gray-100 dark:border-gray-700">
                <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                    <span class="bg-primary text-white w-8 h-8 rounded-full flex items-center justify-center text-sm">1</span>
                    <span id="t-step1-title">Upload Dictionary File</span>
                </h2>
                
                <!-- Dropzone -->
                <div id="dropzone" class="border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-xl p-10 text-center cursor-pointer hover:border-primary dark:hover:border-primary transition-colors bg-gray-50 dark:bg-gray-700/50">
                    <svg class="w-12 h-12 mx-auto text-gray-400 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                    <p class="text-lg font-medium text-gray-600 dark:text-gray-300" id="t-drop-text">Drag & drop your .txt file here</p>
                    <p class="text-sm text-gray-400 mt-1" id="t-drop-subtext">or click to browse your files</p>
                    <input type="file" id="fileInput" accept=".txt" class="hidden">
                </div>
            </section>

            <!-- STEP 2: Filter Categories Section (Hidden by default) -->
            <section id="step2" class="section-hidden bg-white dark:bg-gray-800 rounded-2xl shadow-lg p-6 md:p-8 border border-gray-100 dark:border-gray-700">
                <div class="flex flex-col md:flex-row md:items-center justify-between mb-6 gap-4">
                    <h2 class="text-xl font-bold flex items-center gap-2">
                        <span class="bg-primary text-white w-8 h-8 rounded-full flex items-center justify-center text-sm">2</span>
                        <span id="t-step2-title">Select Categories</span>
                    </h2>
                    <div class="flex gap-2">
                        <button id="btnSelectAll" class="px-4 py-2 text-sm font-medium rounded-lg bg-gray-100 text-gray-700 hover:bg-gray-200 dark:bg-gray-700 dark:text-gray-200 dark:hover:bg-gray-600 transition-colors" id="t-select-all">Select All</button>
                        <button id="btnDeselectAll" class="px-4 py-2 text-sm font-medium rounded-lg bg-gray-100 text-gray-700 hover:bg-gray-200 dark:bg-gray-700 dark:text-gray-200 dark:hover:bg-gray-600 transition-colors" id="t-deselect-all">Deselect All</button>
                    </div>
                </div>
                
                <p class="text-sm text-gray-500 dark:text-gray-400 mb-4" id="t-categories-found">Found <span id="categoryCount" class="font-bold text-gray-800 dark:text-gray-200">0</span> unique categories.</p>

                <!-- Dynamic Checkbox Grid -->
                <div id="checkboxGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 max-h-96 overflow-y-auto p-2 bg-gray-50 dark:bg-gray-900/50 rounded-xl border border-gray-100 dark:border-gray-700">
                    <!-- Checkboxes will be injected here by JS -->
                </div>
            </section>

            <!-- STEP 3: Export Section (Hidden by default) -->
            <section id="step3" class="section-hidden bg-white dark:bg-gray-800 rounded-2xl shadow-lg p-6 md:p-8 border border-gray-100 dark:border-gray-700">
                <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                    <span class="bg-primary text-white w-8 h-8 rounded-full flex items-center justify-center text-sm">3</span>
                    <span id="t-step3-title">Export Data</span>
                </h2>
                
                <div class="flex flex-col sm:flex-row gap-4 items-center justify-between">
                    <div class="w-full sm:w-1/2">
                        <label for="exportFormat" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2" id="t-format-label">Choose Format</label>
                        <select id="exportFormat" class="w-full bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-primary focus:border-primary block p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-primary dark:focus:border-primary">
                            <option value="json">JSON (Key-Value map)</option>
                            <option value="csv">CSV (Comma Separated Values)</option>
                        </select>
                    </div>

                    <div class="flex w-full sm:w-auto gap-3 mt-4 sm:mt-6">
                        <button id="btnReset" class="flex-1 sm:flex-none px-6 py-2.5 text-sm font-medium rounded-lg border border-gray-300 text-gray-700 hover:bg-gray-100 dark:border-gray-600 dark:text-gray-300 dark:hover:bg-gray-700 transition-colors flex items-center justify-center gap-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                            <span id="t-reset">Reset</span>
                        </button>
                        <button id="btnDownload" class="flex-1 sm:flex-none px-6 py-2.5 text-sm font-medium rounded-lg bg-primary text-white hover:bg-primaryHover transition-colors flex items-center justify-center gap-2 shadow-md shadow-primary/30">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                            <span id="t-download">Download</span>
                        </button>
                    </div>
                </div>
            </section>

        </main>
    </div>

    <script>
        /**
         * APPLICATION STATE & VARIABLES
         */
        let parsedData = []; // Will store objects: { word: "zuppa", category: "NOUN-F:s" }
        let uniqueCategories = []; // Array of string categories
        let currentFileName = "dictionary";

        // DOM Elements
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        const step1 = document.getElementById('step1');
        const step2 = document.getElementById('step2');
        const step3 = document.getElementById('step3');
        const checkboxGrid = document.getElementById('checkboxGrid');
        const categoryCountSpan = document.getElementById('categoryCount');
        const btnSelectAll = document.getElementById('btnSelectAll');
        const btnDeselectAll = document.getElementById('btnDeselectAll');
        const btnDownload = document.getElementById('btnDownload');
        const btnReset = document.getElementById('btnReset');
        const exportFormat = document.getElementById('exportFormat');
        
        // Loading Overlay Elements
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');

        /**
         * I18N (INTERNATIONALIZATION)
         */
        const translations = {
            en: {
                title: "Processor",
                subtitle: "Upload your lexicon file, filter by category, and export your custom dictionary.",
                step1Title: "Upload Dictionary File",
                dropText: "Drag & drop your .txt file here",
                dropSubtext: "or click to browse your files",
                step2Title: "Select Categories",
                selectAll: "Select All",
                deselectAll: "Deselect All",
                categoriesFound: "Found <span id=\"categoryCount\" class=\"font-bold text-gray-800 dark:text-gray-200\">{count}</span> unique categories.",
                step3Title: "Export Data",
                formatLabel: "Choose Format",
                reset: "Reset",
                download: "Download",
                loadingRead: "Reading file...",
                loadingParse: "Parsing data... This might take a moment.",
                loadingExport: "Generating file...",
                errorFormat: "Invalid file format. Please upload a valid Morph-it tab-separated .txt file.",
                noCategories: "Please select at least one category before downloading."
            },
            it: {
                title: "Processore",
                subtitle: "Carica il file del lessico, filtra per categoria ed esporta il tuo dizionario personalizzato.",
                step1Title: "Carica File Dizionario",
                dropText: "Trascina qui il tuo file .txt",
                dropSubtext: "oppure clicca per cercare nei tuoi file",
                step2Title: "Seleziona Categorie",
                selectAll: "Seleziona Tutto",
                deselectAll: "Deseleziona Tutto",
                categoriesFound: "Trovate <span id=\"categoryCount\" class=\"font-bold text-gray-800 dark:text-gray-200\">{count}</span> categorie uniche.",
                step3Title: "Esporta Dati",
                formatLabel: "Scegli il Formato",
                reset: "Resetta",
                download: "Scarica",
                loadingRead: "Lettura file in corso...",
                loadingParse: "Elaborazione dati... Potrebbe volerci un attimo.",
                loadingExport: "Generazione file in corso...",
                errorFormat: "Formato file non valido. Carica un file .txt Morph-it valido separato da tabulazioni.",
                noCategories: "Seleziona almeno una categoria prima di scaricare."
            }
        };

        // Determine language based on browser preference
        const userLang = navigator.language || navigator.userLanguage; 
        const lang = userLang.toLowerCase().startsWith('it') ? 'it' : 'en';
        const t = (key) => translations[lang][key];

        // Apply translations on initial load
        function applyTranslations() {
            document.documentElement.lang = lang;
            document.getElementById('t-title').innerText = t('title');
            document.getElementById('t-subtitle').innerText = t('subtitle');
            document.getElementById('t-step1-title').innerText = t('step1Title');
            document.getElementById('t-drop-text').innerText = t('dropText');
            document.getElementById('t-drop-subtext').innerText = t('dropSubtext');
            document.getElementById('t-step2-title').innerText = t('step2Title');
            document.getElementById('btnSelectAll').innerText = t('selectAll');
            document.getElementById('btnDeselectAll').innerText = t('deselectAll');
            document.getElementById('t-step3-title').innerText = t('step3Title');
            document.getElementById('t-format-label').innerText = t('formatLabel');
            document.getElementById('btnReset').innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg> <span>${t('reset')}</span>`;
            document.getElementById('btnDownload').innerHTML = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg> <span>${t('download')}</span>`;
            
            // Note: t-categories-found is updated dynamically during parse.
        }
        applyTranslations();

        /**
         * UTILITY FUNCTIONS (UI & Loading)
         */
        
        // Helper to force the browser to render DOM changes before blocking the main thread
        const yieldToBrowser = () => new Promise(resolve => requestAnimationFrame(() => requestAnimationFrame(resolve)));

        async function showLoading(textKey) {
            loadingText.innerText = t(textKey);
            loadingOverlay.classList.remove('hidden');
            await yieldToBrowser(); // Wait for the UI to actually display the overlay
        }

        function hideLoading() {
            loadingOverlay.classList.add('hidden');
        }

        function showSection(element) {
            element.classList.remove('section-hidden');
            element.style.position = 'relative';
        }

        function hideSection(element) {
            element.classList.add('section-hidden');
            setTimeout(() => { element.style.position = 'absolute'; }, 400); // match transition duration
        }

        /**
         * FILE HANDLING & PARSING
         */

        // Click to upload
        dropzone.addEventListener('click', () => fileInput.click());

        // Drag and Drop events
        dropzone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropzone.classList.add('border-primary', 'bg-green-50', 'dark:bg-green-900/20');
        });

        dropzone.addEventListener('dragleave', () => {
            dropzone.classList.remove('border-primary', 'bg-green-50', 'dark:bg-green-900/20');
        });

        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropzone.classList.remove('border-primary', 'bg-green-50', 'dark:bg-green-900/20');
            
            if (e.dataTransfer.files.length > 0) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        async function handleFile(file) {
            if (!file.name.endsWith('.txt')) {
                alert(t('errorFormat'));
                return;
            }

            // Extract base name for later export
            currentFileName = file.name.replace('.txt', '');

            await showLoading('loadingRead');

            const reader = new FileReader();
            reader.onload = async (e) => {
                const text = e.target.result;
                await processTextData(text);
            };
            reader.readAsText(file);
        }

        async function processTextData(text) {
            await showLoading('loadingParse');
            
            // Reset state
            parsedData = [];
            const categorySet = new Set();
            
            // Parse line by line
            const lines = text.split('\n');
            
            // Using a plain object to act as our dictionary map to avoid duplicates
            // We follow the logic: if word doesn't exist, add it. (Keeps first occurrence).
            const tempDict = {};

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;

                // Morph-it format: Word \t Lemma \t POS-Tag
                const parts = line.split('\t');
                if (parts.length >= 3) {
                    const word = parts[0];
                    const category = parts[2];

                    if (!tempDict[word]) {
                        tempDict[word] = category;
                    }
                    categorySet.add(category);
                }
            }

            // Convert temp dict back to array for easier filtering later
            for (const [word, category] of Object.entries(tempDict)) {
                parsedData.push({ w: word, c: category });
            }

            // Convert Set to sorted Array
            uniqueCategories = Array.from(categorySet).sort();

            hideLoading();
            buildCategoryUI();
        }

        /**
         * BUILDING THE UI (Aggiornata con raggruppamento in Macro-Categorie)
         */
        function buildCategoryUI() {
            // Update labels
            const foundTextHtml = t('categoriesFound').replace('{count}', uniqueCategories.length);
            document.getElementById('t-categories-found').innerHTML = foundTextHtml;

            // Clear previous grid
            checkboxGrid.innerHTML = '';
            
            // Modifichiamo la classe della griglia per ospitare i blocchi verticali in modo elegante
            checkboxGrid.className = "space-y-6 max-h-[500px] overflow-y-auto p-4 bg-gray-50 dark:bg-gray-900/50 rounded-xl border border-gray-100 dark:border-gray-700";

            // 1. Raggruppiamo dinamicamente le categorie in base al prefisso (Macro-categoria)
            const groups = {};
            uniqueCategories.forEach(cat => {
                // Estrae il prefisso prima di ":" o "-" (es: "ADJ", "VER", "NOUN")
                let macro = cat.includes(':') ? cat.split(':')[0] : (cat.includes('-') ? cat.split('-')[0] : cat);
                
                if (!groups[macro]) groups[macro] = [];
                groups[macro].push(cat);
            });

            // 2. Generiamo l'interfaccia ad albero/blocchi per ogni Macro-categoria
            Object.keys(groups).sort().forEach((macro, groupIdx) => {
                
                // Contenitore della macro-categoria
                const groupWrapper = document.createElement('div');
                groupWrapper.className = "bg-white dark:bg-gray-800 p-4 rounded-xl border border-gray-200 dark:border-gray-700 shadow-sm transition-all";

                // Intestazione del gruppo (Titolo + Pulsante di selezione rapida della ramificazione)
                const header = document.createElement('div');
                header.className = "flex items-center justify-between border-b border-gray-100 dark:border-gray-700 pb-2 mb-3";
                
                const title = document.createElement('h3');
                title.className = "text-sm font-bold text-green-500 dark:text-primary flex items-center gap-2 tracking-wide uppercase";
                title.innerText = `${macro} (${groups[macro].length})`;

                const btnToggleGroup = document.createElement('button');
                btnToggleGroup.className = "px-2 py-1 text-xs font-semibold rounded bg-gray-100 hover:bg-gray-200 dark:bg-gray-700 dark:hover:bg-gray-600 text-gray-600 dark:text-gray-300 transition-colors";
                btnToggleGroup.innerText = lang === 'it' ? "Seleziona Gruppo" : "Select Group";
                
                header.appendChild(title);
                header.appendChild(btnToggleGroup);
                groupWrapper.appendChild(header);

                // Griglia interna per le sotto-caratteristiche di questa macro-categoria
                const subGrid = document.createElement('div');
                subGrid.className = "grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-2";

                groups[macro].forEach((cat, catIdx) => {
                    const id = `cat_${groupIdx}_${catIdx}`;
                    
                    const wrapper = document.createElement('div');
                    wrapper.className = "flex items-center space-x-2 p-1.5 rounded hover:bg-gray-50 dark:hover:bg-gray-700/40 transition-colors";

                    const checkbox = document.createElement('input');
                    checkbox.type = "checkbox";
                    checkbox.id = id;
                    checkbox.value = cat; // Mantiene il tag intero per non rompere il sistema di esportazione
                    checkbox.className = "cat-checkbox focus:ring-primary h-4 w-4 text-primary border-gray-300 rounded";

                    const label = document.createElement('label');
                    label.htmlFor = id;
                    label.className = "text-xs font-medium text-gray-600 dark:text-gray-400 select-none cursor-pointer w-full break-all";
                    
                    // Pulizia visiva: mostra solo la ramificazione specifica (es. trasforma "ADJ:pos+f+s" in "pos+f+s")
                    const subLabel = cat.includes(':') ? cat.substring(cat.indexOf(':') + 1) : cat;
                    label.innerText = subLabel;

                    wrapper.appendChild(checkbox);
                    wrapper.appendChild(label);
                    subGrid.appendChild(wrapper);
                });

                // Logica del pulsante del gruppo: se almeno una sotto-voce è deselezionata, le seleziona tutte. Altrimenti le svuota.
                btnToggleGroup.addEventListener('click', (e) => {
                    e.preventDefault();
                    const subCbs = subGrid.querySelectorAll('.cat-checkbox');
                    const anyUnchecked = Array.from(subCbs).some(cb => !cb.checked);
                    subCbs.forEach(cb => cb.checked = anyUnchecked);
                });

                groupWrapper.appendChild(subGrid);
                checkboxGrid.appendChild(groupWrapper);
            });

            // Mostra le sezioni successive con l'animazione verticale
            showSection(step2);
            showSection(step3);
            
            // Scroll fluido verso la sezione di selezione
            setTimeout(() => {
                step2.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 100);
        }

        /**
         * EVENT LISTENERS FOR BUTTONS
         */

        // Select All
        btnSelectAll.addEventListener('click', () => {
            const checkboxes = document.querySelectorAll('.cat-checkbox');
            checkboxes.forEach(cb => cb.checked = true);
        });

        // Deselect All
        btnDeselectAll.addEventListener('click', () => {
            const checkboxes = document.querySelectorAll('.cat-checkbox');
            checkboxes.forEach(cb => cb.checked = false);
        });

        // Reset App
        btnReset.addEventListener('click', () => {
            fileInput.value = "";
            parsedData = [];
            uniqueCategories = [];
            checkboxGrid.innerHTML = "";
            hideSection(step2);
            hideSection(step3);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // Download logic
        btnDownload.addEventListener('click', async () => {
            // Get selected categories
            const selectedCats = Array.from(document.querySelectorAll('.cat-checkbox:checked')).map(cb => cb.value);
            
            if (selectedCats.length === 0) {
                alert(t('noCategories'));
                return;
            }

            await showLoading('loadingExport');

            // Quick timeout to allow UI to render the loading screen before heavy array processing
            setTimeout(() => {
                generateAndDownloadFile(selectedCats);
            }, 50);
        });

        function generateAndDownloadFile(selectedCats) {
            const format = exportFormat.value;
            const selectedSet = new Set(selectedCats); // Set is faster for lookup
            
            // Filter data based on selected categories
            const filteredData = parsedData.filter(item => selectedSet.has(item.c));
            
            let fileContent = "";
            let mimeType = "";
            let fileExtension = "";

            if (format === 'json') {
                // Build a JSON Object Map: { "word": "category" }
                const outputObj = {};
                filteredData.forEach(item => {
                    outputObj[item.w] = item.c;
                });
                fileContent = JSON.stringify(outputObj, null, 2); // format with 2 spaces for readability
                mimeType = "application/json;charset=utf-8;";
                fileExtension = ".json";
            } else if (format === 'csv') {
                // Build CSV format
                const csvRows = ["Word,Category"];
                filteredData.forEach(item => {
                    // Escape quotes just in case, though morph-it words rarely have them
                    const wordEscaped = item.w.replace(/"/g, '""');
                    const catEscaped = item.c.replace(/"/g, '""');
                    csvRows.push(`"${wordEscaped}","${catEscaped}"`);
                });
                fileContent = csvRows.join('\n');
                mimeType = "text/csv;charset=utf-8;";
                fileExtension = ".csv";
            }

            // Create Download Link
            const blob = new Blob([fileContent], { type: mimeType });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            
            link.setAttribute("href", url);
            link.setAttribute("download", `${currentFileName}_filtered${fileExtension}`);
            link.style.visibility = 'hidden';
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            hideLoading();
        }

    </script>
</body>
</html>
